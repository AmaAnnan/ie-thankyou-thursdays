<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IE Thank You Thursdays</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans, sans-serif); background: var(--color-background-tertiary, #f5f5f3); color: var(--color-text-primary); min-height: 100vh; }
  .page { max-width: 960px; margin: 0 auto; padding: 2rem 1rem; }
  .header { text-align: center; margin-bottom: 2rem; }
  .header h1 { font-size: 22px; font-weight: 500; }
  .subtitle { font-size: 14px; color: var(--color-text-secondary); margin-top: 6px; }
  .tabs { display: flex; gap: 8px; margin-bottom: 2rem; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .tab { padding: 8px 18px; font-size: 14px; cursor: pointer; border: none; background: none; color: var(--color-text-secondary); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s; }
  .tab.active { color: var(--color-text-primary); border-bottom-color: #7F77DD; font-weight: 500; }
  .section { display: none; }
  .section.active { display: block; }

  /* Vote cards */
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 14px; }
  .person-card { border-radius: 12px; padding: 1.1rem 0.9rem; text-align: center; transition: transform 0.15s, box-shadow 0.15s; border: none; }
  .person-card:hover { transform: translateY(-2px); }
  .avatar-wrap { position: relative; width: 68px; height: 68px; margin: 0 auto 10px; }
  .avatar, .avatar-placeholder { width: 68px; height: 68px; border-radius: 50%; display: block; }
  .avatar { object-fit: cover; border: 3px solid rgba(255,255,255,0.6); }
  .avatar-placeholder { display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 500; color: white; border: 3px solid rgba(255,255,255,0.4); }
  .upload-btn { position: absolute; bottom: 0; right: 0; width: 22px; height: 22px; border-radius: 50%; background: rgba(255,255,255,0.9); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .upload-btn svg { width: 11px; height: 11px; }
  .person-name { font-size: 12px; font-weight: 500; margin-bottom: 2px; color: white; line-height: 1.3; }
  .person-dept { font-size: 10px; color: rgba(255,255,255,0.8); margin-bottom: 8px; line-height: 1.3; min-height: 26px; }
  .vote-count { font-size: 26px; font-weight: 500; color: white; margin-bottom: 7px; }
  .vote-label { font-size: 10px; color: rgba(255,255,255,0.75); margin-top: -6px; margin-bottom: 8px; }
  .vote-btn { width: 100%; padding: 6px 0; font-size: 12px; font-weight: 500; background: rgba(255,255,255,0.25); color: white; border: 1px solid rgba(255,255,255,0.5); border-radius: 8px; cursor: pointer; transition: background 0.15s; }
  .vote-btn:hover { background: rgba(255,255,255,0.4); }
  .vote-btn:active { transform: scale(0.97); }
  .voted-flash { background: rgba(255,255,255,0.6) !important; color: white !important; }

  /* Bar chart leaderboard */
  .chart-wrap { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
  .chart-title { font-size: 16px; font-weight: 500; margin-bottom: 1.5rem; }
  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .bar-label { width: 170px; font-size: 11px; font-weight: 500; color: var(--color-text-primary); text-align: right; flex-shrink: 0; line-height: 1.3; }
  .bar-track { flex: 1; background: var(--color-background-secondary); border-radius: 99px; height: 30px; position: relative; overflow: visible; }
  .bar-fill { height: 30px; border-radius: 99px; min-width: 6px; transition: width 0.6s cubic-bezier(.4,0,.2,1); position: relative; }
  .bar-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 3px solid white; position: absolute; right: -20px; top: 50%; transform: translateY(-50%); z-index: 2; box-shadow: 0 2px 6px rgba(0,0,0,0.18); }
  .bar-avatar-ph { width: 40px; height: 40px; border-radius: 50%; border: 3px solid white; position: absolute; right: -20px; top: 50%; transform: translateY(-50%); z-index: 2; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; color: white; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }
  .bar-votes { width: 40px; font-size: 12px; font-weight: 500; color: var(--color-text-primary); flex-shrink: 0; padding-left: 24px; }

  /* Ranked list */
  .leaderboard-list { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: 12px; overflow: hidden; margin-top: 1.5rem; }
  .lb-row { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .lb-row:last-child { border-bottom: none; }
  .lb-rank { font-size: 15px; font-weight: 500; width: 28px; text-align: center; color: var(--color-text-secondary); flex-shrink: 0; }
  .lb-av { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
  .lb-av-ph { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; color: white; flex-shrink: 0; }
  .lb-name { flex: 1; font-size: 13px; font-weight: 500; }
  .lb-votes { font-size: 14px; font-weight: 500; }

  /* Admin */
  .admin-section { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
  .admin-title { font-size: 16px; font-weight: 500; margin-bottom: 1rem; }
  .add-form { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
  .add-form input { flex: 1; min-width: 130px; padding: 7px 10px; font-size: 13px; border: 0.5px solid var(--color-border-secondary); border-radius: 8px; background: var(--color-background-secondary); color: var(--color-text-primary); }
  .add-form button { padding: 7px 16px; font-size: 13px; font-weight: 500; background: #534AB7; color: white; border: none; border-radius: 8px; cursor: pointer; }
  .add-form button:hover { background: #3C3489; }
  .people-admin-list { display: flex; flex-direction: column; gap: 8px; }
  .admin-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--color-background-secondary); border-radius: 8px; }
  .admin-row-name { font-size: 13px; font-weight: 500; }
  .admin-row-dept { font-size: 11px; color: var(--color-text-secondary); }
  .del-btn { background: none; border: none; cursor: pointer; color: var(--color-text-secondary); font-size: 15px; padding: 0 4px; }
  .del-btn:hover { color: #A32D2D; }
  .reset-btn { margin-top: 1rem; padding: 7px 16px; font-size: 13px; background: none; border: 0.5px solid var(--color-border-secondary); border-radius: 8px; cursor: pointer; color: var(--color-text-secondary); }
  .reset-btn:hover { background: var(--color-background-secondary); }
  input[type="file"] { display: none; }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div style="font-size:28px;margin-bottom:8px;">&#127881;</div>
    <h1>IE Thank You Thursdays</h1>
    <p class="subtitle">Celebrating thank-yous received across each DTE team this week!</p>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('vote',this)">Vote</button>
    <button class="tab" onclick="showTab('leaderboard',this)">Leaderboard</button>
    <button class="tab" onclick="showTab('admin',this)">Manage</button>
  </div>
  <div id="tab-vote" class="section active"><div class="card-grid" id="voteGrid"></div></div>
  <div id="tab-leaderboard" class="section">
    <div class="chart-wrap">
      <div class="chart-title">Thank-you standings by DTE</div>
      <div id="barChart"></div>
    </div>
    <div class="leaderboard-list" id="lbList"></div>
  </div>
  <div id="tab-admin" class="section">
    <div class="admin-section">
      <div class="admin-title">Add DTE</div>
      <div class="add-form">
        <input type="text" id="newName" placeholder="Head's name" />
        <input type="text" id="newDept" placeholder="DTE area" />
        <button onclick="addPerson()">Add</button>
      </div>
      <div class="people-admin-list" id="adminList"></div>
      <button class="reset-btn" onclick="resetVotes()">Reset all thank-you counts</button>
    </div>
  </div>
</div>
<input type="file" id="imgUpload" accept="image/*" />
<script>
const PALETTE = [
  { bg:'#534AB7', light:'#EEEDFE' },
  { bg:'#1D9E75', light:'#E1F5EE' },
  { bg:'#D85A30', light:'#FAECE7' },
  { bg:'#D4537E', light:'#FBEAF0' },
  { bg:'#378ADD', light:'#E6F1FB' },
  { bg:'#BA7517', light:'#FAEEDA' },
  { bg:'#639922', light:'#EAF3DE' },
  { bg:'#E24B4A', light:'#FCEBEB' },
  { bg:'#0F6E56', light:'#E1F5EE' },
];

const DEFAULT_PEOPLE = [
  { id:1, name:'James A. Harris-Evans', dept:'Infrastructure Architecture & Engineering', votes:0, img:null },
  { id:2, name:'Stephen Denby',          dept:'Edge Services',                            votes:0, img:null },
  { id:3, name:'Katie McDwyer',          dept:'End User Experience (EUX)',                votes:0, img:null },
  { id:4, name:'Sarah Tash',             dept:'Infrastructure Managed Service – DC',      votes:0, img:null },
  { id:5, name:'Sean McAvan',            dept:'Navisite',                                 votes:0, img:null },
  { id:6, name:'Velissarios Lataris',    dept:'Cloud First Networks',                     votes:0, img:null },
  { id:7, name:'Alex J. Bailey',         dept:'Infrastructure & Cloud Operations (co-lead)', votes:0, img:null },
  { id:8, name:'Aditya Rajkhowa',        dept:'Customer Tech',                            votes:0, img:null },
  { id:9, name:'Christopher A. Forbes',  dept:'Networks',                                 votes:0, img:null },
];

let people = JSON.parse(localStorage.getItem('dte_people_v4') || 'null') || JSON.parse(JSON.stringify(DEFAULT_PEOPLE));
let uploadTarget = null;

function save() { localStorage.setItem('dte_people_v4', JSON.stringify(people)); }
function color(idx) { return PALETTE[idx % PALETTE.length]; }
function initials(name) { return name.split(' ').filter(w=>/^[A-Z]/.test(w)).map(w=>w[0]).join('').substring(0,2).toUpperCase(); }

function cardAvatarEl(p, idx) {
  const col = color(idx);
  if (p.img) return `<img class="avatar" src="${p.img}" alt="${p.name}" style="width:68px;height:68px;" />`;
  return `<div class="avatar-placeholder" style="background:rgba(255,255,255,0.25);">${initials(p.name)}</div>`;
}

function barAvatarEl(p, idx) {
  const col = color(idx);
  if (p.img) return `<img class="bar-avatar" src="${p.img}" alt="${p.name}" />`;
  return `<div class="bar-avatar-ph" style="background:${col.bg};">${initials(p.name)}</div>`;
}

function lbAvatarEl(p, idx) {
  const col = color(idx);
  if (p.img) return `<img class="lb-av" src="${p.img}" alt="${p.name}" />`;
  return `<div class="lb-av-ph" style="background:${col.bg};">${initials(p.name)}</div>`;
}

function renderVote() {
  document.getElementById('voteGrid').innerHTML = people.map((p,i) => {
    const col = color(i);
    return `
    <div class="person-card" style="background:${col.bg};">
      <div class="avatar-wrap">
        ${cardAvatarEl(p,i)}
        <button class="upload-btn" title="Upload photo" onclick="triggerUpload(${p.id})">
          <svg viewBox="0 0 16 16" style="fill:${col.bg};"><path d="M8 2a.75.75 0 01.75.75v4.5h4.5a.75.75 0 010 1.5h-4.5v4.5a.75.75 0 01-1.5 0v-4.5h-4.5a.75.75 0 010-1.5h4.5v-4.5A.75.75 0 018 2z"/></svg>
        </button>
      </div>
      <div class="person-name">${p.dept}</div>
      <div class="person-dept">${p.name}</div>
      <div class="vote-count" id="vc-${p.id}">${p.votes}</div>
      <div class="vote-label">thank-you${p.votes !== 1 ? 's' : ''} received</div>
      <button class="vote-btn" id="vb-${p.id}" onclick="vote(${p.id})">&#127881; Add a thank you</button>
    </div>`; 
  }).join('');
}

function renderLeaderboard() {
  const sorted = [...people].map((p,i)=>({...p, origIdx:i})).sort((a,b)=>b.votes-a.votes);
  const maxV = Math.max(...sorted.map(p=>p.votes), 1);

  document.getElementById('barChart').innerHTML = sorted.map((p) => {
    const col = color(p.origIdx);
    const pct = Math.max((p.votes / maxV) * 100, 2);
    return `
      <div class="bar-row">
        <div class="bar-label" title="${p.dept}">${p.dept}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${pct}%;background:${col.bg};">
            ${barAvatarEl(p, p.origIdx)}
          </div>
        </div>
        <div class="bar-votes">${p.votes}</div>
      </div>`;
  }).join('');

  const medals = ['&#127945;','&#129352;','&#129353;'];
  document.getElementById('lbList').innerHTML = sorted.map((p,i) => {
    const col = color(p.origIdx);
    return `
    <div class="lb-row">
      <div class="lb-rank">${i < 3 ? medals[i] : i+1}</div>
      ${lbAvatarEl(p, p.origIdx)}
      <div class="lb-name">${p.dept}<br><span style="font-size:11px;color:var(--color-text-secondary);font-weight:400;">${p.name}</span></div>
      <div class="lb-votes" style="color:${col.bg};">${p.votes} <span style="font-size:11px;font-weight:400;color:var(--color-text-secondary);">thank-you${p.votes!==1?'s':''}</span></div>
    </div>`;
  }).join('');
}

function renderAdmin() {
  document.getElementById('adminList').innerHTML = people.map((p,i) => {
    const col = color(i);
    return `
    <div class="admin-row">
      ${lbAvatarEl(p,i)}
      <div style="flex:1;">
        <div class="admin-row-name">${p.dept}</div>
        <div class="admin-row-dept">${p.name} &middot; ${p.votes} thank-you${p.votes!==1?'s':''}</div>
      </div>
      <button class="del-btn" onclick="deletePerson(${p.id})">&#10005;</button>
    </div>`;
  }).join('');
}

function showTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+tab).classList.add('active');
  if (tab==='leaderboard') renderLeaderboard();
  if (tab==='admin') renderAdmin();
}

function vote(id) {
  const p = people.find(x=>x.id===id); if (!p) return;
  p.votes++; save();
  document.getElementById('vc-'+id).textContent = p.votes;
  const btn = document.getElementById('vb-'+id);
  btn.classList.add('voted-flash'); btn.textContent = 'Added!';
  setTimeout(()=>{ btn.classList.remove('voted-flash'); btn.innerHTML='&#127881; Add a thank you'; }, 900);
}

function addPerson() {
  const name = document.getElementById('newName').value.trim();
  const dept = document.getElementById('newDept').value.trim();
  if (!name) return;
  people.push({ id:Date.now(), name, dept, votes:0, img:null });
  save(); document.getElementById('newName').value=''; document.getElementById('newDept').value='';
  renderVote(); renderAdmin();
}

function deletePerson(id) {
  if (!confirm('Remove this DTE?')) return;
  people = people.filter(p=>p.id!==id); save(); renderVote(); renderAdmin();
}

function resetVotes() {
  if (!confirm('Reset all thank-you counts to zero?')) return;
  people.forEach(p=>p.votes=0); save(); renderVote(); renderAdmin();
}

function triggerUpload(id) { uploadTarget=id; document.getElementById('imgUpload').click(); }

document.getElementById('imgUpload').addEventListener('change', function(e) {
  const file = e.target.files[0]; if (!file||!uploadTarget) return;
  const r = new FileReader();
  r.onload = ev => {
    const p = people.find(x=>x.id===uploadTarget);
    if (p) { p.img=ev.target.result; save(); renderVote(); renderAdmin();
      const activeTab = document.querySelector('.tab.active');
      if (activeTab && activeTab.textContent.trim()==='Leaderboard') renderLeaderboard();
    }
    uploadTarget=null; this.value='';
  };
  r.readAsDataURL(file);
});

renderVote();
</script>
</body>
</html>
